# Brazilian weekday meal templates
# Carb ranges based on typical Brazilian portions

cafe_da_manha:
  total_carb_range: [30, 60]
  offset_from_wake_minutes: 30
  slots:
    - category: panificado
      probability: 0.80
      servings: [1, 2]
      preferred: ["Pao frances", "Pao integral"]
    - category: bebida
      probability: 0.95
      servings: [1, 1]
      preferred: ["Cafe com leite e acucar", "Cafe com leite sem acucar"]
    - category: fruta
      probability: 0.40
      servings: [0.5, 1]
    - category: cereal
      probability: 0.20
      servings: [0.5, 1]
      preferred: ["Tapioca", "Aveia em flocos", "Granola"]
    - category: laticinio
      probability: 0.30
      servings: [1, 1]
      preferred: ["Iogurte natural", "Iogurte com frutas"]

lanche_manha:
