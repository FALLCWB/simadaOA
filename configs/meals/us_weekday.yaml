# US weekday meal templates (author-constructed representative national pattern).
# Meal STRUCTURE is held at carb ranges comparable to the Brazilian templates so
# the cross-country contrast reflects food COMPOSITION (GI, fibre, macros) rather
# than gross carbohydrate quantity. Foods/categories reference data/taco/us_foods.csv.
# NOT validated against NHANES dietary microdata -- documented limitation (ASSUMPTIONS).

cafe_da_manha:
  total_carb_range: [30, 60]
  offset_from_wake_minutes: 30
  slots:
    - category: grain
      probability: 0.80
      servings: [1, 1.5]
      preferred: ["Cornflakes", "Cheerios", "Oatmeal cooked", "White bread", "Whole grain bread", "Bagel plain", "Pancakes"]
    - category: protein
      probability: 0.45
      servings: [1, 1]
      preferred: ["Eggs scrambled"]
    - category: beverage
      probability: 0.90
      servings: [1, 1]
      preferred: ["Coffee black", "Orange juice", "Reduced-fat milk 2pct", "Whole milk"]
    - category: fruit
      probability: 0.40
      servings: [0.5, 1]
    - category: dairy
      probability: 0.30
      servings: [1, 1]
      preferred: ["Greek yogurt plain", "Flavored yogurt"]

