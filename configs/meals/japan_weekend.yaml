# Japan weekend meal templates (author-constructed representative national pattern).
# Versus weekday: more noodle/rice-bowl eating out, more wagashi sweets and beer,
# slightly higher carb ranges. Foods reference data/taco/japan_foods.csv.

cafe_da_manha:
  total_carb_range: [35, 65]
  offset_from_wake_minutes: 60
  slots:
    - category: grain
      probability: 0.85
      servings: [1, 1.5]
      preferred: ["White rice cooked (japonica)", "Japanese milk bread (shokupan)", "Rice ball (onigiri)"]
    - category: soup
      probability: 0.50
      servings: [1, 1]
      preferred: ["Miso soup (basic dashi + miso)"]
    - category: protein
      probability: 0.50
      servings: [1, 1]
      preferred: ["Japanese rolled omelette", "Soft-boiled egg"]
    - category: soy
      probability: 0.30
      servings: [1, 1]
      preferred: ["Natto (fermented soybeans)"]
    - category: beverage
      probability: 0.85
      servings: [1, 1]
      preferred: ["Green tea (sencha, unsweetened)", "Milk coffee (cafe au lait)"]
    - category: fruit
      probability: 0.35
      servings: [0.5, 1]

