# Japan weekday meal templates (author-constructed representative national pattern).
# Meal STRUCTURE is held at carb ranges comparable to the Brazilian/US templates so
# the cross-country contrast reflects food COMPOSITION (GI, fibre, macros) rather
# than gross carbohydrate quantity. Foods reference data/taco/japan_foods.csv.
# NOT validated against the National Health and Nutrition Survey (Japan) microdata
# -- documented limitation (ASSUMPTIONS).

cafe_da_manha:
  total_carb_range: [30, 60]
  offset_from_wake_minutes: 30
  slots:
    - category: grain
      probability: 0.85
      servings: [1, 1]
      preferred: ["White rice cooked (japonica)", "Rice ball (onigiri)", "Japanese milk bread (shokupan)"]
    - category: soup
      probability: 0.55
      servings: [1, 1]
      preferred: ["Miso soup (basic dashi + miso)"]
    - category: protein
      probability: 0.45
      servings: [1, 1]
      preferred: ["Soft-boiled egg", "Japanese rolled omelette", "Whole egg boiled"]
    - category: soy
      probability: 0.35
      servings: [1, 1]
      preferred: ["Natto (fermented soybeans)", "Firm tofu"]
    - category: fish
      probability: 0.25
      servings: [1, 1]
      preferred: ["Horse mackerel grilled", "Sardine grilled"]
    - category: beverage
      probability: 0.85
      servings: [1, 1]
      preferred: ["Green tea (sencha, unsweetened)", "Barley tea (unsweetened)", "Milk coffee (cafe au lait)"]
    - category: fruit
      probability: 0.30
      servings: [0.5, 1]

