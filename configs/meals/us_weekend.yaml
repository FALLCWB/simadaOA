# US weekend meal templates (author-constructed representative national pattern).
# Versus weekday: later/larger breakfast (brunch-leaning), more fast food and
# dessert, slightly higher carb ranges. Foods reference data/taco/us_foods.csv.

cafe_da_manha:
  total_carb_range: [40, 75]
  offset_from_wake_minutes: 60
  slots:
    - category: grain
      probability: 0.85
      servings: [1, 2]
      preferred: ["Pancakes", "Waffles", "Bagel plain", "English muffin", "White bread"]
    - category: protein
      probability: 0.60
      servings: [1, 1]
      preferred: ["Eggs scrambled"]
    - category: beverage
      probability: 0.90
      servings: [1, 1]
      preferred: ["Coffee black", "Orange juice", "Whole milk"]
    - category: fruit
      probability: 0.45
      servings: [0.5, 1]
    - category: dessert
      probability: 0.25
      servings: [0.5, 1]
      preferred: ["Donut glazed", "Blueberry muffin"]

lanche_manha:
  total_carb_range: [10, 30]
  offset_from_wake_minutes: 210
  probability: 0.30
  slots:
    - category: fruit
      probability: 0.55
      servings: [0.5, 1]
    - category: snack
      probability: 0.45
      servings: [1, 1]
      preferred: ["Granola bar oats and honey", "Almonds"]

